<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh-CN' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Growth Tools Blog</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ page.author | default: site.author }}">
    {% if page.canonical_url %}<link rel="canonical" href="{{ page.canonical_url }}">{% else %}<link rel="canonical" href="{{ page.url | absolute_url }}">{% endif %}
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ page.canonical_url | default: page.url | absolute_url }}">
    {% if page.image %}<meta property="og:image" content="{{ page.image }}">{% endif %}

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:creator" content="@Iris_carrot">
    {% if page.image %}<meta name="twitter:image" content="{{ page.image }}">{% endif %}
    
    {% seo %}
    
    <!-- Article Schema (GEO/SEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": {{ page.title | jsonify }},
      "description": "{{ page.description | default: site.description }}",
      "author": {
        "@type": "Person",
        "name": "Iris",
        "url": "https://twitter.com/Iris_carrot"
      },
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "publisher": {
        "@type": "Organization",
        "name": "Gingiris",
        "url": "https://gingiris.com"
      },
      {% if page.image %}"image": "{{ page.image }}",{% endif %}
      "url": "{{ page.canonical_url | default: page.url | absolute_url }}",
      "mainEntityOfPage": "{{ page.canonical_url | default: page.url | absolute_url }}"
    }
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #fff;
            --text-secondary: #888;
            --accent: #6366f1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }
        .header-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-weight: 700; font-size: 18px; color: var(--text); }
        .logo span { color: var(--accent); }
        .nav { display: flex; gap: 20px; font-size: 14px; }
        .nav a { color: var(--text-secondary); }
        .nav a:hover { color: var(--text); text-decoration: none; }
        
        .content { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
        
        .footer {
            border-top: 1px solid var(--border);
            padding: 24px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="{{ site.baseurl }}/" class="logo">🚀 <span>Growth</span>Tools</a>
            <nav class="nav">
                <a href="{{ site.baseurl }}/">工具库</a>
                <a href="{{ site.baseurl }}/blog/">Blog</a>
                <a href="https://gingiris.com">Gingiris</a>
                <a href="https://github.com/Gingiris">GitHub</a>
            </nav>
        </div>
    </header>
    
    <main class="content">
        {{ content }}
    </main>
    
    <footer class="footer">
        <p>© {{ 'now' | date: "%Y" }} <a href="https://gingiris.com">Gingiris</a> · Built by <a href="https://twitter.com/Iris_carrot">@Iris</a></p>
    </footer>
</body>
</html>
