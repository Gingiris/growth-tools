            --border: #2a2a2a;
            --text: #fff;
            --text-secondary: #888;
            --accent: #6366f1;
            --accent-hover: #818cf8;

            --blue: #3b82f6;

            --pink: #ec4899;
        }
        
        body {

            top: 0;

        .logo span { color: var(--accent); }
        
        .lang-switch {

            border-radius: 6px;
            padding: 6px 12px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .lang-switch:hover {
            background: var(--accent);
            color: white;
        }
        
        /* Search */
        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }
        
        .search-box input {

            padding: 10px 16px 10px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }
        
        .header-links {
            display: flex;
            gap: 16px;
            font-size: 14px;
        }
        
        .header-links a {
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        
        .header-links a:hover { color: var(--text); }
        .header-links .submit-btn {
            background: var(--accent);
            color: #fff !important;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
        }
        .header-links .submit-btn:hover {
            background: #2563eb;
        }
        
        /* Main Layout */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            min-height: calc(100vh - 60px);
        }
        
        /* Sidebar */
        .sidebar {
            width: 220px;
            padding: 24px 16px;
            border-right: 1px solid var(--border);
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding: 0 8px;
        }
        
        .category-list {
            list-style: none;
        }
        
        .category-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            margin-bottom: 2px;
        }
        
        .category-item:hover { background: var(--surface); }
        .category-item.active { background: var(--accent); color: #fff; }
        
        .category-count {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .category-item.active .category-count {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        /* Content */

            flex: 1;
            padding: 24px;
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

            font-weight: 600;
        }

            gap: 8px;

            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;

        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }
        
        .tool-card:hover {
            border-color: var(--accent);

        }
        
        .tool-header {

            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .tool-icon {

            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;

            margin-bottom: 4px;
            display: flex;
            align-items: center;

            color: var(--text-secondary);

        /* Mobile */

</head>

            { name: "RapidAPI", desc: "API 集成市场", category: "开发工具", price: "freemium", url: "https://rapidapi.com/", icon: "⚡" },
            
            // Gingiris 免费工具
            { name: "PH Comment Generator", desc: "Product Hunt 评论生成器", category: "Gingiris", price: "free", url: "https://gingiris.github.io/ph-comment-generator/", icon: "💬" },
            { name: "GitHub Issue Generator", desc: "开源项目 Issue 生成器", category: "Gingiris", price: "free", url: "https://gingiris.github.io/github-issue-generator/", icon: "📝" },
            { name: "GitHub README Generator", desc: "README 模板生成器", category: "Gingiris", price: "free", url: "https://gingiris.github.io/github-readme-generator/", icon: "📄" },
        ];
        
        // Get categories
        const categories = [...new Set(tools.map(t => t.category))];
        
        // State
        let activeCategory = 'all';
        let activePrice = 'all';
        let searchQuery = '';
        
        // Render categories
        function renderCategories() {
            const list = document.getElementById('categoryList');
            const allCount = tools.length;
            
            list.innerHTML = `
                <li class="category-item active" data-category="all">
                    📁 全部工具
                    <span class="category-count">${allCount}</span>
                </li>
                ${categories.map(cat => {
                    const count = tools.filter(t => t.category === cat).length;
                    const icon = getCategoryIcon(cat);
                    return `
                        <li class="category-item" data-category="${cat}">
                            ${icon} ${cat}
                            <span class="category-count">${count}</span>
                        </li>
                    `;
                }).join('')}
            `;
            
            // Add click handlers
            list.querySelectorAll('.category-item').forEach(item => {
                item.addEventListener('click', () => {
                    list.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    activeCategory = item.dataset.category;
                    renderTools();
                });
            });
        }
        
        function getCategoryIcon(cat) {
            const icons = {
                '社媒监听': '📡', 'KOL管理': '👥', '社媒触达': '✉️', 'Reddit': '🔴',
                'SEO': '🔍', '链接追踪': '🔗', 'UGC管理': '🎬', '社区发现': '🌐',
                '内容创作': '🎨', '分析埋点': '📊', '邮件营销': '📧', '广告投放': '📢',
                '用户调研': '🔬', '媒体PR': '📰', '网络拓展': '🤝', '增长服务': '🚀',
                '开发工具': '⚡', 'Gingiris': '🫚'
            };
            return icons[cat] || '📁';
        }
        
        // Render tools
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const noResults = document.getElementById('noResults');
            const title = document.getElementById('categoryTitle');
            const count = document.getElementById('toolCount');
            
            let filtered = tools;
            
            // Filter by category
            if (activeCategory !== 'all') {
                filtered = filtered.filter(t => t.category === activeCategory);
            }
            
            // Filter by price
            if (activePrice !== 'all') {
                filtered = filtered.filter(t => t.price === activePrice);
            }
            
            // Filter by search
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(t => 
                    t.name.toLowerCase().includes(q) ||
                    t.desc.toLowerCase().includes(q) ||
                    t.category.toLowerCase().includes(q)
                );
            }
            
            // Update header
            title.textContent = activeCategory === 'all' ? '全部工具' : activeCategory;
            count.textContent = `${filtered.length} tools`;
            
            if (filtered.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            
            grid.innerHTML = filtered.map(tool => `
                <a href="${tool.url}" target="_blank" class="tool-card">
                    <div class="tool-header">
                        <div class="tool-icon">${tool.icon}</div>
                        <div class="tool-info">
                            <div class="tool-name">${tool.name}</div>
                            <div class="tool-category">${tool.category}</div>
                        </div>
                    </div>
                    <div class="tool-desc">${tool.desc}</div>
                    <div class="tool-footer">
                        <span class="price-tag price-${tool.price}">${tool.price.charAt(0).toUpperCase() + tool.price.slice(1)}</span>
                        <span class="tool-link">访问 →</span>
                    </div>
                </a>
            `).join('');
        }
        
        // Search handler
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTools();
        });
        
        // Price filter handler
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activePrice = btn.dataset.price;
                renderTools();
            });
        });
        
        // Init
        renderCategories();
        renderTools();
    </script>
</body>
</html>
