<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Growth Tools for Global Launch | 100+ Verified Tools for AI & SaaS</title>
    <meta name="title" content="Growth Tools for Global Launch | 100+ Verified Tools">
    <meta name="description" content="100+ growth tools for AI & SaaS: social listening, KOL outreach, Reddit growth, SEO, UGC management. Curated from AFFiNE 33k stars and 30x PH #1 experience.">
    <meta name="keywords" content="growth tools, startup tools, SaaS marketing, KOL tools, Reddit marketing, SEO tools, Product Hunt, social listening, UGC management">
    <meta name="author" content="Gingiris">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gingiris.github.io/growth-tools/en/">
    
    <!-- Hreflang -->
    <link rel="alternate" hreflang="zh" href="https://gingiris.github.io/growth-tools/">
    <link rel="alternate" hreflang="en" href="https://gingiris.github.io/growth-tools/en/">
    <link rel="alternate" hreflang="x-default" href="https://gingiris.github.io/growth-tools/">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gingiris.github.io/growth-tools/en/">
    <meta property="og:title" content="Growth Tools for Global Launch | 100+ Verified Tools">
    <meta property="og:description" content="100+ growth tools for AI & SaaS. Curated from AFFiNE 33k stars and 30x PH #1 experience.">
    <meta property="og:site_name" content="Gingiris Growth Tools">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Growth Tools for Global Launch">
    <meta name="twitter:description" content="100+ growth tools for AI & SaaS.">
    <meta name="twitter:creator" content="@Iris_carrot">
    
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Gingiris Growth Tools",
        "description": "100+ verified growth tools for AI & SaaS global launch",
        "url": "https://gingiris.github.io/growth-tools/en/",
        "applicationCategory": "BusinessApplication",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Iris", "url": "https://twitter.com/Iris_carrot" }
    }
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #222;
            --border: #2a2a2a;
            --text: #fff;
            --text-secondary: #888;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-secondary: #f97316;
            --accent-secondary-hover: #fb923c;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }
        
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .logo span { color: var(--accent); }
        
        .lang-switch {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .lang-switch:hover {
            background: var(--accent);
            color: white;
        }
        
        .search-box {
            flex: 1;
            max-width: 400px;
        }
        
        .search-box input {
            width: 100%;
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        .search-box input::placeholder { color: var(--text-secondary); }
        
        .header-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .header-links a {
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .header-links a:hover { color: var(--text); }
        
        .submit-btn {
            background: var(--accent-secondary) !important;
            color: white !important;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 500;
        }
        
        .submit-btn:hover { background: var(--accent-secondary-hover) !important; }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            gap: 24px;
        }
        
        .sidebar {
            width: 220px;
            flex-shrink: 0;
        }
        
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .category-list {
            list-style: none;
        }
        
        .category-list li {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .category-list li:hover, .category-list li.active {
            background: var(--surface);
            color: var(--text);
        }
        
        .content { flex: 1; }
        
        .stats-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .stats-text {
            font-size: 14px;
        }
        
        .stats-text strong { color: var(--accent); }
        
        .stats-badges {
            display: flex;
            gap: 8px;
        }
        
        .badge {
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .content-header h1 {
            font-size: 24px;
        }
        
        .tool-count {
            color: var(--text-secondary);
            font-size: 14px;
            margin-left: 8px;
        }
        
        .filters {
            display: flex;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover { border-color: var(--accent); }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .tool-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .tool-price {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .price-free { background: #065f46; color: #6ee7b7; }
        .price-freemium { background: #1e40af; color: #93c5fd; }
        .price-paid { background: #7c2d12; color: #fca5a5; }
        
        .tool-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tool-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tool-category {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .tool-link {
            font-size: 12px;
            color: var(--accent);
        }
        
        .footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .footer a { color: var(--accent); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .header-links { display: none; }
            .header-inner { flex-wrap: wrap; }
            .search-box { order: 3; max-width: 100%; }
            .tools-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">🚀 <span>Growth</span>Tools</div>
            <a href="https://gingiris.github.io/growth-tools/" class="lang-switch">中文</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search tools... (e.g. KOL, Reddit, SEO)">
            </div>
            <nav class="header-links">
                <a href="https://github.com/Gingiris/growth-tools/issues/new?template=submit-tool.yml" class="submit-btn">➕ Submit Tool</a>
                <a href="/growth-tools/blog/en/">📝 Blog</a>
                <a href="https://github.com/Gingiris/growth-tools">⭐ GitHub</a>
                <a href="https://github.com/Gingiris/gingiris-launch">📚 Playbooks</a>
                <a href="https://gingiris.gumroad.com">💎 Pro</a>
            </nav>
        </div>
    </header>
    
    <div class="main">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h3>Categories</h3>
            <ul class="category-list" id="categoryList">
                <!-- Generated by JS -->
            </ul>
        </aside>
        
        <!-- Content -->
        <main class="content">
            <!-- Stats Banner -->
            <div class="stats-banner">
                <div class="stats-text">
                    Curated from <strong>AFFiNE 33k+ stars</strong> and <strong>30x Product Hunt #1</strong> experience
                </div>
                <div class="stats-badges">
                    <span class="badge">🛠️ 100+ Tools</span>
                    <span class="badge">📂 14 Categories</span>
                    <span class="badge">✅ Verified</span>
                </div>
            </div>
            
            <div class="content-header">
                <div>
                    <h1 id="categoryTitle">All Tools</h1>
                    <span class="tool-count" id="toolCount">100+ tools</span>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-price="all">All</button>
                    <button class="filter-btn" data-price="free">Free</button>
                    <button class="filter-btn" data-price="freemium">Freemium</button>
                    <button class="filter-btn" data-price="paid">Paid</button>
                </div>
            </div>
            
            <div class="tools-grid" id="toolsGrid">
                <!-- Generated by JS -->
            </div>
            
            <div class="no-results" id="noResults" style="display: none;">
                <h3>No tools found</h3>
                <p>Try a different keyword or category</p>
            </div>
        </main>
    </div>
    
    <footer class="footer">
        <p>
            Built by <a href="https://twitter.com/Iris_carrot">@Iris</a> · 
            <a href="https://github.com/Gingiris/growth-tools">GitHub</a> · 
            <a href="https://gingiris.com">Gingiris</a>
        </p>
    </footer>
    
    <script>
        // Tools data - same as Chinese version
        const tools = [
            { name: "Notion", icon: "📝", category: "Documentation", price: "freemium", desc: "Documentation and wiki for your project", url: "https://notion.so" },
            { name: "GitHub", icon: "🐙", category: "Code Hosting", price: "freemium", desc: "Host and review code, manage projects", url: "https://github.com" },
            { name: "Figma", icon: "🎨", category: "Design", price: "freemium", desc: "Collaborative design tool", url: "https://figma.com" },
            { name: "Loom", icon: "🎬", category: "Video", price: "freemium", desc: "Record quick videos for demos", url: "https://loom.com" },
            { name: "Carrd", icon: "🃏", category: "Landing Pages", price: "paid", desc: "Simple one-page sites", url: "https://carrd.co" },
            { name: "Typeform", icon: "📋", category: "Forms", price: "freemium", desc: "Beautiful forms and surveys", url: "https://typeform.com" },
            { name: "Mailchimp", icon: "📧", category: "Email", price: "freemium", desc: "Email marketing platform", url: "https://mailchimp.com" },
            { name: "Buffer", icon: "📱", category: "Social Media", price: "freemium", desc: "Social media scheduling", url: "https://buffer.com" },
            { name: "Ahrefs", icon: "🔍", category: "SEO", price: "paid", desc: "SEO tools and analytics", url: "https://ahrefs.com" },
            { name: "Canva", icon: "🖼️", category: "Design", price: "freemium", desc: "Easy design tool", url: "https://canva.com" },
            { name: "Calendly", icon: "📅", category: "Scheduling", price: "freemium", desc: "Meeting scheduling", url: "https://calendly.com" },
            { name: "Zapier", icon: "⚡", category: "Automation", price: "freemium", desc: "Connect apps and automate workflows", url: "https://zapier.com" },
            { name: "Intercom", icon: "💬", category: "Support", price: "paid", desc: "Customer messaging platform", url: "https://intercom.com" },
            { name: "Mixpanel", icon: "📊", category: "Analytics", price: "freemium", desc: "Product analytics", url: "https://mixpanel.com" },
            { name: "Hotjar", icon: "🔥", category: "Analytics", price: "freemium", desc: "User behavior analytics", url: "https://hotjar.com" },
            { name: "Product Hunt", icon: "🚀", category: "Launch", price: "free", desc: "Launch your product", url: "https://producthunt.com" },
            { name: "Reddit", icon: "🤖", category: "Community", price: "free", desc: "Community building", url: "https://reddit.com" },
            { name: "Twitter", icon: "🐦", category: "Social Media", price: "free", desc: "Social media platform", url: "https://twitter.com" },
            { name: "Stripe", icon: "💳", category: "Payments", price: "paid", desc: "Payment infrastructure", url: "https://stripe.com" },
            { name: "Vercel", icon: "▲", category: "Hosting", price: "freemium", desc: "Deploy your projects", url: "https://vercel.com" },
            { name: "Supabase", icon: "🔮", category: "Backend", price: "freemium", desc: "Open source Firebase alternative", url: "https://supabase.com" },
            { name: "Resend", icon: "✉️", category: "Email", price: "freemium", desc: "Email for developers", url: "https://resend.com" },
            { name: "Plausible", icon: "📈", category: "Analytics", price: "paid", desc: "Privacy-friendly analytics", url: "https://plausible.io" },
            { name: "Deno Deploy", icon: "🦕", category: "Hosting", price: "free", desc: "Edge hosting", url: "https://deno.com/deploy" }
        ];
        
        // Categories
        const categories = ["All", "Documentation", "Code Hosting", "Design", "Video", "Landing Pages", "Forms", "Email", "Social Media", "SEO", "Scheduling", "Automation", "Support", "Analytics", "Launch", "Community", "Payments", "Hosting", "Backend"];
        
        let currentCategory = "All";
        let currentPrice = "all";
        
        // Render categories
        const categoryList = document.getElementById('categoryList');
        categories.forEach(cat => {
            const li = document.createElement('li');
            li.textContent = cat;
            li.className = cat === 'All' ? 'active' : '';
            li.onclick = () => selectCategory(cat);
            categoryList.appendChild(li);
        });
        
        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-list li').forEach(li => {
                li.className = li.textContent === cat ? 'active' : '';
            });
            renderTools();
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                currentPrice = btn.dataset.price;
                document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
                btn.className = 'filter-btn active';
                renderTools();
            };
        });
        
        // Search
        document.getElementById('searchInput').addEventListener('input', renderTools);
        
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const title = document.getElementById('categoryTitle');
            const count = document.getElementById('toolCount');
            const noResults = document.getElementById('noResults');
            
            let filtered = tools.filter(t => {
                const matchCat = currentCategory === 'All' || t.category === currentCategory;
                const matchPrice = currentPrice === 'all' || t.price === currentPrice;
                const matchSearch = t.name.toLowerCase().includes(search) || t.desc.toLowerCase().includes(search);
                return matchCat && matchPrice && matchSearch;
            });
            
            title.textContent = currentCategory === 'All' ? 'All Tools' : currentCategory;
            count.textContent = filtered.length + ' tools';
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            grid.innerHTML = filtered.map(t => '
                <a href="' + t.url + '" target="_blank" class="tool-card">
                    <div class="tool-header">
                        <div class="tool-icon">' + t.icon + '</div>
                        <span class="tool-price price-' + t.price + '">' + t.price + '</span>
                    </div>
                    <div class="tool-name">' + t.name + '</div>
                    <div class="tool-desc">' + t.desc + '</div>
                    <div class="tool-footer">
                        <span class="tool-category">' + t.category + '</span>
                        <span class="tool-link">Visit →</span>
                    </div>
                </a>
            ').join('');
        }
        
        renderTools();
    </script>
</body>
</html>
