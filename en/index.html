    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #222;
            --border: #2a2a2a;
            --text: #fff;
            --text-secondary: #888;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-secondary: #f97316;
            --accent-secondary-hover: #fb923c;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }
        
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .logo span { color: var(--accent); }
        
        .lang-switch {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .lang-switch:hover {
            background: var(--accent);
            color: white;
        }
        
        .search-box {
            flex: 1;
            max-width: 400px;
        }
        
        .search-box input {
            width: 100%;
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        .search-box input::placeholder { color: var(--text-secondary); }
        
        .header-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .header-links a {
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .header-links a:hover { color: var(--text); }
        
        .submit-btn {
            background: var(--accent-secondary) !important;
            color: white !important;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 500;
        }
        
        .submit-btn:hover { background: var(--accent-secondary-hover) !important; }
        
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            gap: 24px;
        }
        
        .sidebar {
            width: 220px;
            flex-shrink: 0;
        }
        
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .category-list {
            list-style: none;
        }
        
        .category-list li {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .category-list li:hover, .category-list li.active {
            background: var(--surface);
            color: var(--text);
        }
        
        .content { flex: 1; }
        
        .stats-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .stats-text {
            font-size: 14px;
        }
        
        .stats-text strong { color: var(--accent); }
        
        .stats-badges {
            display: flex;
            gap: 8px;
        }
        
        .badge {
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .content-header h1 {
            font-size: 24px;
        }
        
        .tool-count {
            color: var(--text-secondary);
            font-size: 14px;
            margin-left: 8px;
        }
        
        .filters {
            display: flex;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover { border-color: var(--accent); }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .tool-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .tool-price {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .price-free { background: #065f46; color: #6ee7b7; }
        .price-freemium { background: #1e40af; color: #93c5fd; }
        .price-paid { background: #7c2d12; color: #fca5a5; }
        
        .tool-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tool-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tool-category {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .tool-link {
            font-size: 12px;
            color: var(--accent);
        }
        
        .footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .footer a { color: var(--accent); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .header-links { display: none; }
            .header-inner { flex-wrap: wrap; }
            .search-box { order: 3; max-width: 100%; }
            .tools-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
